apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-app
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sre-app
  template:
    metadata:
      labels:
        app: sre-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: sre-app
          image: sre-app:latest
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: sre-app-service
  namespace: production
spec:
  selector:
    app: sre-app
  ports:
    - port: 80
      targetPort: 5000
  type: LoadBalancer
